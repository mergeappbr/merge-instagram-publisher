# Calendário de provas — milestones T-30/T-15/T-7/T-1 (countdown) + T+1 (resultados).
#
# kind=ironman → countdown auto + carrossel resultados M+F.
# kind=mtb|trail → countdown auto. Resultados (T+1) ainda manual (sem fetcher).
#
# Datas em formato ISO YYYY-MM-DD (timezone implícita: race day local, mas tracker
# compara com America/Sao_Paulo no scheduler — boa o suficiente pra T-N dias).
#
# Imagens:
#   bg_pool (lista) → tracker rotaciona evitando repetir nos últimos 60 dias
#                     (state em output/.bg_history.json).
#   bg_countdown (string) → retrocompat, single image.
#   logo → arquivo em brand/ (não brand/images/). Quando ausente OU arquivo
#          não encontrado, template usa pill laranja com sigla.

races:
  - id: im_brasil_2026
    name: "IRONMAN Brasil"
    kind: ironman
    distance: full          # full | 70.3
    location: "Florianópolis · SC"
    location_short: "FLORIPA"
    date: "2026-05-31"
    site: "https://www.ironman.com/im-brazil"
    ironstats_handle: "ironstatsbr"
    logo: "IronFullLogo.png"
