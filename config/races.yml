    # IDEAL: subir 5+ fotos da Maratona do Rio (Aterro, calçadão, Cristo,
    # largada) em brand/images/ pra substituir gradativamente.
    bg_pool:
      - marathon.jpg
      - _bank/marathon_finish_line/pexels/3518952.jpg
      - _bank/marathon_finish_line/pexels/17982930.jpg
