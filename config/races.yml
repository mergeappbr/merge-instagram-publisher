  # ----- maratonas BR -----

  - id: maratona_poa_2026
    name: "Maratona Internacional Porto Alegre"
    kind: marathon
    distance: "42"
    location: "Porto Alegre · RS"
    location_short: "POA"
    location_dative: "em Porto Alegre"
    date: "2026-05-31"
    site: "https://maratonadeportoalegre.com.br"
    logo: "MaratonaPOALogo.png"
    # Pool: marathon.jpg + 5 fotos do banco _bank (chegada/percurso urbano).
    # Idealmente trocar por fotos da prova quando ficarem disponíveis.
    bg_pool:
      - marathon.jpg
      - _bank/marathon_finish_line/pexels/3518952.jpg
      - _bank/marathon_finish_line/pexels/17982930.jpg
      - _bank/marathon_finish_line/pexels/29837388.jpg
      - _bank/marathon_finish_line/unsplash/bLpwpZ2E_80.jpg
      - _bank/marathon_finish_line/unsplash/pPYKExEwlkc.jpg
    race_label_short: "POA · 31/05"
    kicker: "MARATONA POA · 31/05/26"

