    notes: clube/marca de corrida BR

  - name: Pacer
    handle: usepacer
    notes: app/comunidade de corrida

  - name: Zyla
    handle: zyla.fit
    notes: wellness/treino digital

  - name: Asics Brasil
    handle: asicsbrasil
    site: https://www.asics.com.br
    notes: foco corrida; storytelling de elite + amador

  - name: Strava
    handle: strava
