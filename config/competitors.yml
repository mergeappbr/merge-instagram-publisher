# Concorrentes monitorados pelo Competitor Intelligence Agent.
#
# Roda toda sexta 16:00 BRT (antes do news-recap), gera
# output/competitors_weekly.md + digest no Telegram.
#
# Campos:
#   name      (obrigatório) — display name
#   handle    (opcional)    — IG handle SEM @. Requer conta IG Business/Creator
#                            pública (Business Discovery API). Se omitido,
#                            só o site é monitorado.
#   site      (opcional)    — URL pra tentar RSS (/feed, /rss, /blog/feed)
#   notes     (opcional)    — contexto curto (posicionamento, ângulo)
#
# Edite à vontade. O agente lida com handles inválidos / feeds 404 sem crashar.

competitors:
  - name: House of Pace
