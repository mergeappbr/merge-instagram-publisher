<!-- FEATURE — post com imagem de fundo escurecida + headline grande
     Layout puro: sem logo, sem kicker, sem footer. Apenas pílula, headline e lead. -->
<div class="canvas canvas--{{SIZE}} {{BG_CLASS}}">
  {{BG_LAYERS}}

  <div class="hero hero--feature {{HERO_SIZE_CLASS}}">
    <span class="pill"><span class="dot"></span>{{PILL}}</span>
    <h1 class="headline {{HEADLINE_SIZE_CLASS}}" style="margin-top:36px;">{{HEADLINE}}</h1>
    <p class="lead {{LEAD_SIZE_CLASS}}">{{LEAD}}</p>
  </div>
</div>
