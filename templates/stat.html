<!-- STAT CARD — numeral gigante (estilo slides 9, 11, 12 do deck) -->
<div class="canvas canvas--{{SIZE}} {{BG_CLASS}}">
  {{BG_LAYERS}}
  <div class="statblock">
    {{STAT_KICKER_HTML}}
    <div class="bigstat {{STAT_SIZE_CLASS}}"><span class="accent">{{STAT_NUM}}</span><span class="unit">{{STAT_UNIT}}</span></div>
    <div class="bigstat-caption">{{STAT_CAPTION}}</div>
  </div>

  <div class="hero" style="margin-top:0;">
    <h1 class="headline {{HEADLINE_SIZE_CLASS}}">{{HEADLINE}}</h1>
    <p class="lead {{LEAD_SIZE_CLASS}}">{{LEAD}}</p>
  </div>
  {{PRICE_TAG}}
</div>
