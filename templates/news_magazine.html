<!-- NEWS MAGAZINE — feed post de notícia, estilo magazine The News.
     Foto full-bleed + overlay forte + pill NEWS + headline GIGANTE +
     lead curto + rodapé com source · merge. wordmark.

     Vars do writer: PILL (sempre "NEWS"), HEADLINE, LEAD, BG_IMAGE.
     Vars adicionais (injetadas em feed_post._build_brief):
       SOURCE        — fonte da notícia (ex: "Velo · Outside")
-->
<style>
  .nm-bg-photo {
    position: absolute;
    inset: 0;
    background-position: center;
    background-size: cover;
    z-index: 0;
  }
  /* Overlay forte (news prioriza legibilidade total) */
  .nm-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(10,10,10,0.55) 0%,
      rgba(10,10,10,0.35) 25%,
      rgba(10,10,10,0.30) 45%,
      rgba(10,10,10,0.65) 65%,
      rgba(10,10,10,0.96) 100%
    );
    z-index: 1;
  }
  .nm-block {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* TOPO — pill NEWS · DATA */
  .nm-pill {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 12px 22px;
    background: var(--orange);
    color: var(--orange-ink);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
  }
  .canvas--story .nm-pill {
    font-size: 26px;
    padding: 14px 26px;
    /* IG Stories tem ~250px de safe-area no topo (avatar/username overlay).
       Canvas já tem padding-top de 100px. Empurra +150px pra pill cair
       fora da área coberta pela UI do Instagram. */
    margin-top: 150px;
  }
  .nm-pill .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--orange-ink);
  }
  .nm-spacer { flex: 1; }

  /* RODAPÉ — headline + lead + meta */
  .nm-foot-block {
    position: relative;
    z-index: 2;
  }

  .nm-headline {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 104px;
    line-height: 0.94;
    letter-spacing: -0.035em;
    color: #FFFFFF;
    margin: 0 0 28px;
    text-wrap: balance;
    hyphens: manual;
    text-shadow: 0 4px 32px rgba(0,0,0,0.55);
  }
  .canvas--story .nm-headline { font-size: 132px; margin-bottom: 36px; }
  .nm-headline .hl { color: var(--orange); }

  .nm-lead {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 30px;
    line-height: 1.32;
    letter-spacing: -0.012em;
    color: rgba(255,255,255,0.92);
    margin: 0 0 28px;
    max-width: 92%;
    text-shadow: 0 2px 16px rgba(0,0,0,0.5);
  }
  .canvas--story .nm-lead { font-size: 36px; max-width: 88%; }
  .nm-lead br + br { content: ""; }

  /* META — source esquerda + wordmark merge. direita */
  .nm-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.20);
    font-family: var(--font-mono);
    font-size: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.82);
  }
  .canvas--story .nm-meta { font-size: 22px; padding-top: 24px; }
  .nm-meta .nm-source { display: inline-flex; gap: 10px; align-items: center; }
  .nm-meta .nm-source .label { color: rgba(255,255,255,0.55); font-weight: 600; }
  .nm-meta .nm-source .name { color: #FFFFFF; font-weight: 700; }

  .nm-wordmark {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 32px;
    letter-spacing: -0.03em;
    color: #FFFFFF;
    text-transform: lowercase;
    line-height: 1;
    display: inline-block;
  }
  .canvas--story .nm-wordmark { font-size: 40px; }
  .nm-wordmark .dot { color: var(--orange); }
</style>

<div class="canvas canvas--{{SIZE}}">
  <div class="nm-bg-photo" style="background-image:url('{{BG_IMAGE}}');"></div>
  <div class="nm-overlay"></div>
  <div class="nm-block">

    <!-- pill NEWS -->
    <span class="nm-pill">
      <span class="dot"></span>
      <span>{{PILL}}</span>
    </span>

    <div class="nm-spacer"></div>

    <!-- HEADLINE + LEAD + META -->
    <div class="nm-foot-block">
      <h1 class="nm-headline">{{HEADLINE}}</h1>
      <p class="nm-lead">{{LEAD}}</p>
      <div class="nm-meta">
        <span class="nm-source">
          <span class="label">via</span>
          <span class="name">{{SOURCE}}</span>
        </span>
        <span class="nm-wordmark">merge<span class="dot">.</span></span>
      </div>
    </div>
  </div>
</div>
