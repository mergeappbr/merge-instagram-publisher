<!-- IRONMAN RANKING (Mock B) — slide único com top 10 masc + fem lado-a-lado.
     Vars: RACE_LABEL, MASC_ROWS_HTML, FEM_ROWS_HTML -->
<style>
  .im-sp-block {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 0;
  }
  .im-sp-head {
    margin-bottom: 28px;
  }
  .im-sp-pill {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 12px 22px;
    background: var(--orange);
    color: var(--orange-ink);
    border-radius: 999px;
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .im-sp-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 68px;
    line-height: 0.96;
    letter-spacing: -0.025em;
    color: var(--ink);
    text-transform: lowercase;
    margin: 0 0 6px;
  }
  .canvas--story .im-sp-title { font-size: 88px; }
  .im-sp-title .hl { color: var(--orange); }
  .im-sp-sub {
    font-family: var(--font-mono);
    font-size: 16px;
    color: var(--ink-soft);
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin: 0;
  }
  .im-sp-cols {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
  }
  .im-sp-col {
    display: flex;
    flex-direction: column;
  }
  .im-sp-col-label {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--orange);
  }
  .im-sp-rows {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .im-sp-row {
    display: grid;
    grid-template-columns: 38px 1fr 100px;
    align-items: center;
    gap: 12px;
    padding: 9px 10px;
    border-bottom: 1px solid var(--hairline);
  }
  .im-sp-row.top1 .im-sp-pos { color: var(--orange); }
  .im-sp-row.top1 .im-sp-name { color: var(--ink); font-weight: 800; }
  .im-sp-pos {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 22px;
    color: var(--muted);
    letter-spacing: -0.02em;
    text-align: center;
  }
  .im-sp-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 19px;
    color: var(--ink-soft);
    line-height: 1.15;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .im-sp-time {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 17px;
    color: var(--ink-soft);
    text-align: right;
    letter-spacing: 0.01em;
  }
  .im-sp-foot {
    margin-top: 24px;
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .im-sp-foot .handle { color: var(--ink-soft); }
  .im-sp-foot .src { color: var(--orange); }
</style>

<div class="canvas canvas--{{SIZE}} {{BG_CLASS}}">
  {{BG_LAYERS}}
  <div class="im-sp-block">
    <div class="im-sp-head">
      <span class="im-sp-pill">{{RACE_PILL}}</span>
      <h1 class="im-sp-title">top 10 <span class="hl">brasileiros</span>.</h1>
      <p class="im-sp-sub">{{RACE_LABEL}}</p>
    </div>
    <div class="im-sp-cols">
      <div class="im-sp-col">
        <div class="im-sp-col-label">masculino</div>
        <div class="im-sp-rows">{{MASC_ROWS_HTML}}</div>
      </div>
      <div class="im-sp-col">
        <div class="im-sp-col-label">feminino</div>
        <div class="im-sp-rows">{{FEM_ROWS_HTML}}</div>
      </div>
    </div>
    <div class="im-sp-foot">
      <span class="handle">@mergeapp.wellness</span>
      <span class="src">dados via @ironstatsbr · ironman.com</span>
    </div>
  </div>
</div>
