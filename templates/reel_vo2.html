<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Reel · VO2 max é o novo colesterol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../brand/tokens.css">
<style>
  /* SAFE ZONES — Reels 1080×1920
     Conteúdo crítico: y=[320, 1480], x=[100, 880] */
  body { margin: 0; overflow: hidden; background: #0A0A0A; }
  .reel {
    position: relative;
    width: 1080px; height: 1920px;
    background: #0A0A0A;
    overflow: hidden;
    font-family: var(--font-display);
    color: var(--ink);
  }

  /* BG photo (Villarinho track) */
  .bg {
    position: absolute; inset: 0;
    background-image: url('file:///Users/pedrowanderleyalmeida/Desktop/Merge/brand/images/villarinho_track.jpg');
    background-size: cover;
    background-position: center 35%;
    opacity: 0;
    transform: scale(1.06);
    animation: bg-fade 1.0s ease-out 0.3s forwards, bg-zoom 14s ease-out 0.3s forwards;
  }
  @keyframes bg-fade { to { opacity: 1; } }
  @keyframes bg-zoom { to { transform: scale(1.18); } }

  .overlay {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(
      180deg,
      rgba(10,10,10,0.85) 0%,
      rgba(10,10,10,0.55) 25%,
      rgba(10,10,10,0.55) 55%,
      rgba(10,10,10,0.92) 100%
    );
  }

  /* Pill (top, safe zone) */
  .pill {
    position: absolute;
    top: 320px; left: 100px;
    z-index: 4;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 24px;
    background: rgba(10,10,10,0.72);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 22px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink);
    opacity: 0; transform: translateY(-12px);
    animation: pill-in 0.5s cubic-bezier(.34,1.56,.64,1) 0.3s forwards;
  }
  .pill .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--orange); animation: pulse 1.4s ease-in-out 0.8s infinite; }
  @keyframes pill-in { to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Counter (centro): 0x → 5x */
  .counter {
    position: absolute;
    top: 540px;
    left: 100px; right: 100px;
    z-index: 4;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 380px;
    line-height: 0.94;
    letter-spacing: -0.05em;
    color: var(--orange);
    text-shadow: 0 6px 30px rgba(0,0,0,0.65), 0 0 60px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(20px);
    animation: counter-in 0.6s ease-out 0.8s forwards;
  }
  .counter .x {
    font-size: 0.55em;
    color: var(--ink);
    margin-left: 16px;
    vertical-align: top;
  }
  @keyframes counter-in { to { opacity: 1; transform: translateY(0); } }

  /* Subcaption (kicker baixo do número) */
  .sub-caption {
    position: absolute;
    top: 940px;
    left: 100px; right: 100px;
    z-index: 4;
    font-family: var(--font-mono);
    font-size: 26px; font-weight: 600;
    letter-spacing: 0.20em; text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0;
    animation: caption-in 0.7s ease-out 5.2s forwards;
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    padding: 10px 18px;
    border-radius: 8px;
    display: inline-block;
    width: fit-content;
  }
  @keyframes caption-in { to { opacity: 1; } }

  /* Headline */
  .headline {
    position: absolute;
    top: 1080px;
    left: 100px; right: 100px;
    z-index: 4;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 96px;
    line-height: 0.96;
    letter-spacing: -0.035em;
    color: var(--ink);
    text-transform: lowercase;
    text-shadow: 0 2px 18px rgba(0,0,0,0.55);
    opacity: 0; transform: translateY(20px);
    animation: head-in 0.9s cubic-bezier(.22,1,.36,1) 6.0s forwards;
    margin: 0;
  }
  .headline .hl { color: var(--orange); }
  @keyframes head-in { to { opacity: 1; transform: translateY(0); } }

  /* Lead */
  .lead {
    position: absolute;
    top: 1280px;
    left: 100px; right: 100px;
    z-index: 4;
    font-family: var(--font-display);
    font-size: 30px; font-weight: 500;
    line-height: 1.35;
    color: var(--ink-soft);
    max-width: 820px;
    opacity: 0;
    animation: lead-in 0.8s ease-out 7.2s forwards;
    margin: 0;
  }
  @keyframes lead-in { to { opacity: 1; } }

  /* Logo */
  .reel-logo {
    position: absolute;
    bottom: 380px; left: 100px;
    z-index: 5;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 44px;
    letter-spacing: -0.02em;
    color: var(--ink);
    opacity: 0;
    animation: logo-in 0.5s ease-out 1.4s forwards;
  }
  .reel-logo .dot { color: var(--orange); }
  @keyframes logo-in { to { opacity: 1; } }

  /* Flash sutil quando o counter atinge 5x */
  .flash {
    position: absolute; inset: 0; z-index: 6;
    background: var(--orange);
    opacity: 0; pointer-events: none;
    animation: flash 0.5s ease-out 5.2s forwards;
    mix-blend-mode: screen;
  }
  @keyframes flash {
    0% { opacity: 0; }
    35% { opacity: 0.32; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<div class="reel">
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="pill"><span class="dot"></span>VO2 MAX · LONGEVIDADE</div>

  <div class="counter" id="counter">0<span class="x">x</span></div>
  <div class="sub-caption">MENOR RISCO DE MORTE PRECOCE</div>

  <h1 class="headline"><span class="hl">vo2 max</span><br>é o novo colesterol.</h1>
  <p class="lead">JAMA · 122 mil pessoas.<br>capacidade cardiorrespiratória prediz mortalidade<br>melhor que tabagismo, diabetes ou hipertensão.</p>

  <div class="reel-logo">merge<span class="dot">.</span></div>
  <div class="flash"></div>
</div>

<script>
  // Counter sobe de 0x até 5x ao longo de 4.0s, easeOutCubic.
  // Inicia somente quando <body> tem a classe `.go` (sincroniza com o renderer).
  const counter = document.getElementById('counter');
  const start = 0, end = 5;
  const duration = 4000;
  const delay = 800; // ms — bate com counter-in CSS

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  function run() {
    const startTime = performance.now() + delay;
    function tick(now) {
      const elapsed = now - startTime;
      if (elapsed < 0) { requestAnimationFrame(tick); return; }
      const t = Math.min(elapsed / duration, 1);
      const value = start + (end - start) * easeOutCubic(t);
      counter.innerHTML = `${Math.floor(value)}<span class="x">x</span>`;
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function waitForGo() {
    if (document.body && document.body.classList.contains('go')) { run(); return; }
    new MutationObserver((muts, obs) => {
      if (document.body.classList.contains('go')) { obs.disconnect(); run(); }
    }).observe(document.body || document.documentElement, { attributes: true, attributeFilter: ['class'] });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', waitForGo);
  } else {
    waitForGo();
  }
</script>
</body>
</html>
