<!-- PRODUCT — card de produto: foto à direita (feed) ou no topo (story), texto à esquerda/abaixo. -->
<div class="canvas canvas--{{SIZE}}">
  <div class="product product--{{SIZE}}">
    <div class="copy">
      <span class="pill"><span class="dot"></span>{{PILL}}</span>
      <div class="product-stat">
        <span class="product-stat__num accent">{{STAT_NUM}}</span><span class="product-stat__unit">{{STAT_UNIT}}</span>
      </div>
      <h1 class="headline {{HEADLINE_SIZE_CLASS}}">{{HEADLINE}}</h1>
      <p class="lead {{LEAD_SIZE_CLASS}}">{{LEAD}}</p>
    </div>
    <div class="product-stage">
      <img class="product-image" src="{{PRODUCT_IMAGE}}" alt="">
    </div>
  </div>
</div>
