<!-- MOCKUP — reveal de tela do app. Feed: split (texto à esquerda · phone à direita). Story: empilhado (texto em cima · phone embaixo). -->
<div class="canvas canvas--{{SIZE}}">
  <div class="mockup mockup--{{SIZE}}">
    <div class="copy">
      <span class="pill"><span class="dot"></span>{{PILL}}</span>
      <h1 class="headline {{HEADLINE_SIZE_CLASS}}">{{HEADLINE}}</h1>
      <p class="lead {{LEAD_SIZE_CLASS}}">{{LEAD}}</p>
    </div>
    <div class="stage">
      <div class="phone phone--{{SIZE}}">
        <img src="{{SCREEN_IMAGE}}" alt="">
      </div>
    </div>
  </div>
</div>
