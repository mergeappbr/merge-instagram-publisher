<!-- QUIZ — interativo (4 opções estilizadas como cards do deck) -->
<div class="canvas canvas--{{SIZE}} {{BG_CLASS}}">
  {{BG_LAYERS}}
  <div class="hero {{HERO_SIZE_CLASS}}">
    <h1 class="headline {{HEADLINE_SIZE_CLASS}}">{{HEADLINE}}</h1>
    <p class="lead {{LEAD_SIZE_CLASS}}">{{LEAD}}</p>

    <div class="quiz">
      <div class="opt"><span>{{OPT_A}}</span><span class="key">A</span></div>
      <div class="opt"><span>{{OPT_B}}</span><span class="key">B</span></div>
      <div class="opt"><span>{{OPT_C}}</span><span class="key">C</span></div>
      <div class="opt"><span>{{OPT_D}}</span><span class="key">D</span></div>
    </div>
  </div>
</div>
