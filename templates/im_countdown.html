<!-- COUNTDOWN — número gigante de dias + título da prova + handle.
     Vars: KICKER, DAYS, DAYS_UNIT, HEADLINE, LEAD, RACE_LABEL, EVENT_LOGO (opcional) -->
<style>
  .im-cd-bg-photo {
    position: absolute;
    inset: 0;
    background-position: center;
    background-size: cover;
    z-index: 0;
  }
  .im-cd-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      100deg,
      rgba(10,10,10,0.94) 0%,
      rgba(10,10,10,0.82) 45%,
      rgba(10,10,10,0.55) 100%
    );
    z-index: 1;
  }
  .im-cd-block {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .im-cd-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
  .im-cd-kicker {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 22px;
    background: rgba(10,10,10,0.78);
    border: 1.5px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .im-cd-kicker .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--orange);
  }
  .im-cd-logo-card {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 12px 18px;
    display: inline-flex;
    align-items: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }
  .im-cd-logo-card.is-dark {
    background: #0A0A0A;
    border: 1.5px solid rgba(255,255,255,0.18);
  }
  .im-cd-logo-card img {
    height: 44px;
    width: auto;
    display: block;
  }
  .im-cd-event-pill {
    display: inline-flex;
    align-items: center;
    padding: 12px 22px;
    background: var(--orange);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 800;
    color: #0a0a0a;
    letter-spacing: 0.20em;
    text-transform: uppercase;
  }
  .im-cd-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
  }
  .im-cd-num {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 520px;
    line-height: 0.84;
    letter-spacing: -0.06em;
    color: var(--orange);
    text-transform: lowercase;
    text-shadow: 0 8px 60px rgba(255,105,0,0.25);
  }
  .canvas--story .im-cd-num { font-size: 640px; }
  .im-cd-num .unit {
    font-size: 0.16em;
    color: var(--ink-soft);
    margin-left: 18px;
    letter-spacing: 0;
    vertical-align: top;
    font-weight: 600;
  }
  .im-cd-headline {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 92px;
    line-height: 0.96;
    letter-spacing: -0.03em;
    color: var(--ink);
    text-transform: lowercase;
    margin: 40px 0 0;
    max-width: 880px;
  }
  .canvas--story .im-cd-headline { font-size: 116px; }
  .im-cd-headline .hl { color: var(--orange); }
  .im-cd-lead {
    font-family: var(--font-body);
    font-size: 30px;
    line-height: 1.42;
    color: var(--ink-soft);
    margin: 28px 0 0;
    max-width: 820px;
  }
  .canvas--story .im-cd-lead { font-size: 36px; }
  .im-cd-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.10);
    font-family: var(--font-mono);
    font-size: 18px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .canvas--story .im-cd-foot { font-size: 22px; }
  .im-cd-foot .handle { color: var(--ink-soft); font-weight: 700; }
  .im-cd-foot .race { color: var(--orange); font-weight: 700; }
  .im-cd-foot .brand-mark { display: inline-flex; align-items: center; }
  .im-cd-foot .brand-mark .brand-logo {
    position: static; top: auto; left: auto;
    width: 32px; height: auto; display: block;
  }
  .canvas--story .im-cd-foot .brand-mark .brand-logo { width: 42px; }
</style>

<div class="canvas canvas--{{SIZE}}">
  <div class="im-cd-bg-photo" style="background-image:url('{{BG_IMAGE}}');"></div>
  <div class="im-cd-overlay"></div>
  <div class="im-cd-block">
    <div class="im-cd-top">
      <span class="im-cd-kicker"><span class="dot"></span>{{KICKER}}</span>
      {{LOGO_BLOCK}}
    </div>
    <div class="im-cd-stage">
      <div class="im-cd-num">{{DAYS}}<span class="unit">{{DAYS_UNIT}}</span></div>
      <h1 class="im-cd-headline">{{HEADLINE}}</h1>
      <p class="im-cd-lead">{{LEAD}}</p>
    </div>
    <div class="im-cd-foot">
      <span class="brand-mark">{{LOGO}}</span>
      <span class="race">{{RACE_LABEL}}</span>
    </div>
  </div>
</div>
