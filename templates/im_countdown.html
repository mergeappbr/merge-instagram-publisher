<!-- COUNTDOWN — estilo magazine "the news":
     foto hero full-bleed + bolha circular flutuante com logo da prova +
     headline GIGANTE no rodapé. Sem header (limpo). Watermark "merge."
     no rodapé direito, alinhada com kicker da esquerda.

     Vars: KICKER, DAYS, DAYS_UNIT, HEADLINE, LEAD, RACE_LABEL,
           CIRCLE_INNER, CIRCLE_DARK_CLASS.
-->
<style>
  .im-cd-bg-photo {
    position: absolute;
    inset: 0;
    background-position: center;
    background-size: cover;
    z-index: 0;
  }
  /* Overlay magazine: leve no topo (foto respira) +
     forte no rodapé (legibilidade do título gigante). */
  .im-cd-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(10,10,10,0.30) 0%,
      rgba(10,10,10,0.10) 22%,
      rgba(10,10,10,0.06) 42%,
      rgba(10,10,10,0.55) 70%,
      rgba(10,10,10,0.96) 100%
    );
    z-index: 1;
  }
  .im-cd-block {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* CÍRCULO FLUTUANTE — logo da prova ou pill com sigla */
  .im-cd-circle-row {
    margin-top: 0;
    display: flex;
    justify-content: flex-start;
  }
  .im-cd-circle {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 24px 60px rgba(0,0,0,0.55),
      0 0 0 6px rgba(255,255,255,0.12);
    overflow: hidden;
    padding: 28px;
  }
  .canvas--story .im-cd-circle { width: 320px; height: 320px; padding: 38px; }
  .im-cd-circle.is-dark {
    background: #0A0A0A;
    box-shadow:
      0 24px 60px rgba(0,0,0,0.65),
      0 0 0 6px rgba(255,255,255,0.18);
  }
  .im-cd-circle img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    display: block;
    object-fit: contain;
  }
  .im-cd-circle .pill-fallback {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 36px;
    letter-spacing: -0.02em;
    color: var(--orange);
    text-transform: uppercase;
    text-align: center;
    line-height: 1;
  }

  /* SPACER pra empurrar o headline pro rodapé */
  .im-cd-spacer { flex: 1; }

  /* HEADLINE gigante embaixo, estilo capa "the news" */
  .im-cd-foot-block {
    position: relative;
    z-index: 2;
  }

  /* Kicker T-N — pill com fundo escuro pra GARANTIR legibilidade
     em qualquer foto (clara, escura, com prédios, com céu, etc). */
  .im-cd-kicker {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 12px 22px;
    background: rgba(10,10,10,0.82);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.10);
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--orange);
    margin: 0 0 32px;
  }
  .canvas--story .im-cd-kicker {
    font-size: 26px;
    padding: 14px 26px;
    margin-bottom: 40px;
  }
  .im-cd-kicker .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--orange);
  }
  .im-cd-kicker .days {
    color: #FFFFFF;
    font-weight: 800;
  }
  .im-cd-kicker .sep {
    color: rgba(255,255,255,0.40);
  }

  .im-cd-headline {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 124px;
    line-height: 0.94;
    letter-spacing: -0.035em;
    color: #FFFFFF;
    margin: 0;
    text-wrap: balance;
    hyphens: manual;
    text-shadow: 0 4px 32px rgba(0,0,0,0.55);
  }
  .canvas--story .im-cd-headline { font-size: 156px; }
  .im-cd-headline .hl { color: var(--orange); }

  /* Rodapé com kicker (esq) + wordmark "merge." (dir) */
  .im-cd-meta {
    margin-top: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.18);
    font-family: var(--font-mono);
    font-size: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.82);
  }
  .canvas--story .im-cd-meta { font-size: 22px; margin-top: 36px; padding-top: 22px; }

  /* Wordmark "merge." — Inter Black branco + ponto laranja.
     Maior que o texto da esquerda mas mantém alinhamento à baseline. */
  .im-cd-wordmark {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 32px;
    letter-spacing: -0.03em;
    color: #FFFFFF;
    text-transform: lowercase;
    line-height: 1;
    display: inline-block;
  }
  .canvas--story .im-cd-wordmark { font-size: 40px; }
  .im-cd-wordmark .dot {
    color: var(--orange);
  }
</style>

<div class="canvas canvas--{{SIZE}}">
  <div class="im-cd-bg-photo" style="background-image:url('{{BG_IMAGE}}');"></div>
  <div class="im-cd-overlay"></div>
  <div class="im-cd-block">

    <!-- CÍRCULO flutuante com logo da prova (estilo bolha do FitBit no TNS) -->
    <div class="im-cd-circle-row">
      <div class="im-cd-circle{{CIRCLE_DARK_CLASS}}">
        {{CIRCLE_INNER}}
      </div>
    </div>

    <div class="im-cd-spacer"></div>

    <!-- RODAPÉ: kicker T-N (pill escuro) + headline GIGANTE +
         meta (kicker esquerda · wordmark merge. direita) -->
    <div class="im-cd-foot-block">
      <span class="im-cd-kicker">
        <span class="dot"></span>
        <span class="days">{{DAYS}} {{DAYS_UNIT}}</span>
        <span class="sep">·</span>
        <span>countdown</span>
      </span>
      <h1 class="im-cd-headline">{{HEADLINE}}</h1>
      <div class="im-cd-meta">
        <span>{{KICKER}}</span>
        <span class="im-cd-wordmark">merge<span class="dot">.</span></span>
      </div>
    </div>
  </div>
</div>
