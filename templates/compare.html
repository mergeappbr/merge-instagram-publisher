<!-- COMPARE — antes vs agora (estilo slide 14 do deck) -->
<div class="canvas canvas--{{SIZE}} {{BG_CLASS}}">
  {{BG_LAYERS}}
  <div class="hero {{HERO_SIZE_CLASS}}">
    <h1 class="headline {{HEADLINE_SIZE_CLASS}}">{{HEADLINE}}</h1>
    <p class="lead {{LEAD_SIZE_CLASS}}">{{LEAD}}</p>

    <div class="compare">
      <div class="col">
        <div class="label">{{LEFT_LABEL}}</div>
        <div class="body">{{LEFT_BODY}}</div>
      </div>
      <div class="col is-orange">
        <div class="label">{{RIGHT_LABEL}}</div>
        <div class="body">{{RIGHT_BODY}}</div>
      </div>
    </div>
  </div>
</div>
