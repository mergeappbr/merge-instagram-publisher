<!-- CARROSSEL COVER — capa do post de carrossel (modalidades) -->
<div class="canvas canvas--{{SIZE}}">
  <div class="hero {{HERO_SIZE_CLASS}}">
    <span class="pill"><span class="dot"></span>{{PILL}}</span>
    <h1 class="headline {{HEADLINE_SIZE_CLASS}}" style="margin-top:36px;">{{HEADLINE}}</h1>
    <p class="lead {{LEAD_SIZE_CLASS}}">{{LEAD}}</p>

    <div class="modalities">
      <span class="modality is-active">triatlo</span>
      <span class="modality">corrida</span>
      <span class="modality">bike road</span>
      <span class="modality">natação</span>
    </div>
  </div>
</div>
