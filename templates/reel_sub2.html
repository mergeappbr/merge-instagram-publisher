<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Reel · Sub 2h</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../brand/tokens.css">
<style>
  /* ============ REEL SCENE ============ */
  body { margin: 0; overflow: hidden; background: #0A0A0A; }

  .reel {
    position: relative;
    width: 1080px;
    height: 1920px;
    background: #0A0A0A;
    overflow: hidden;
    font-family: var(--font-display);
    color: var(--ink);
  }

  /* ===== Background image (Sawe) ===== */
  .reel-bg {
    position: absolute;
    inset: 0;
    background-image: url('file:///Users/pedrowanderleyalmeida/Desktop/Merge/brand/images/villarinho_race.jpg');
    background-size: cover;
    background-position: center 35%;
    opacity: 0;
    transform: scale(1.05);
    animation:
      bg-fade 1.0s ease-out 0.3s forwards,
      bg-zoom 14s ease-out 0.3s forwards;
  }
  @keyframes bg-fade {
    to { opacity: 1; }
  }
  @keyframes bg-zoom {
    to { transform: scale(1.18); }
  }

  /* gradient overlay */
  .reel-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(10,10,10,0.55) 0%,
      rgba(10,10,10,0.20) 30%,
      rgba(10,10,10,0.30) 55%,
      rgba(10,10,10,0.92) 100%
    );
    z-index: 1;
  }

  /* ===== Pill (top) ===== */
  .reel-pill {
    position: absolute;
    top: 140px;
    left: 100px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 22px;
    background: rgba(255, 105, 0, 0.95);
    color: var(--orange-ink);
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border-radius: 999px;
    opacity: 0;
    transform: translateY(-20px);
    animation: pill-in 0.6s cubic-bezier(.34,1.56,.64,1) 0.2s forwards;
  }
  .reel-pill::before {
    content: "●";
    font-size: 14px;
    color: var(--orange-ink);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pill-in {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ===== Counter (timer animado) ===== */
  .reel-counter {
    position: absolute;
    top: 320px;
    left: 100px;
    right: 100px;
    z-index: 3;
    font-family: var(--font-mono);
    font-size: 200px;
    font-weight: 700;
    letter-spacing: -0.04em;
    color: var(--ink);
    line-height: 1;
    opacity: 0;
    transform: translateY(20px);
    animation: counter-in 0.5s ease-out 0.5s forwards;
  }
  @keyframes counter-in {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Final time reveal (replaces counter) ===== */
  .reel-final {
    position: absolute;
    top: 280px;
    left: 100px;
    right: 100px;
    z-index: 4;
    opacity: 0;
    transform: scale(0.85);
    animation: final-in 0.9s cubic-bezier(.34,1.56,.64,1) 4.8s forwards;
  }
  .reel-final__time {
    font-family: var(--font-display);
    font-size: 220px;
    font-weight: 900;
    color: var(--orange);
    line-height: 0.95;
    letter-spacing: -0.045em;
    white-space: nowrap;
  }
  .reel-final__label {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 24px;
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(6px);
    padding: 10px 20px;
    border-radius: 8px;
    display: inline-block;
  }
  @keyframes final-in {
    to { opacity: 1; transform: scale(1); }
  }

  /* hide counter when final shows */
  .reel-counter {
    animation:
      counter-in 0.5s ease-out 0.5s forwards,
      counter-out 0.5s ease-in 4.7s forwards;
  }
  @keyframes counter-out {
    to { opacity: 0; transform: scale(0.9); }
  }

  /* ===== Bottom block (context + CTA) ===== */
  .reel-bottom {
    position: absolute;
    bottom: 220px;
    left: 100px;
    right: 100px;
    z-index: 3;
    opacity: 0;
    transform: translateY(40px);
    animation: bottom-in 0.9s cubic-bezier(.22,1,.36,1) 6.5s forwards;
  }
  .reel-bottom__headline {
    font-family: var(--font-display);
    font-size: 92px;
    font-weight: 900;
    line-height: 0.98;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 32px;
  }
  .reel-bottom__headline .hl { color: var(--orange); }
  .reel-bottom__lead {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--ink-soft);
    max-width: 820px;
  }
  @keyframes bottom-in {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Logo Merge (bottom-left, persistent) ===== */
  .reel-logo {
    position: absolute;
    bottom: 100px;
    left: 100px;
    z-index: 4;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 40px;
    letter-spacing: -0.02em;
    opacity: 0;
    animation: logo-in 0.5s ease-out 1.4s forwards, logo-pulse 2s ease-in-out 8s infinite;
  }
  .reel-logo .dot {
    color: var(--orange);
  }
  @keyframes logo-in {
    to { opacity: 1; }
  }
  @keyframes logo-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  /* ===== Highlight flash on final reveal ===== */
  .reel-flash {
    position: absolute;
    inset: 0;
    z-index: 5;
    background: var(--orange);
    opacity: 0;
    pointer-events: none;
    animation: flash 0.5s ease-out 4.7s forwards;
  }
  @keyframes flash {
    0% { opacity: 0; }
    30% { opacity: 0.55; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<div class="reel">
  <div class="reel-bg"></div>
  <div class="reel-overlay"></div>

  <div class="reel-pill">LONDRES · 26 ABR · 2026</div>

  <!-- Counter rolando (animado por JS) -->
  <div class="reel-counter" id="counter">0:00:00</div>

  <!-- Time final que aparece com flash -->
  <div class="reel-final">
    <div class="reel-final__time">1:59:30</div>
    <div class="reel-final__label">RECORDE MUNDIAL</div>
  </div>

  <div class="reel-flash"></div>

  <div class="reel-bottom">
    <h1 class="reel-bottom__headline">a barreira <span class="hl">caiu</span>.</h1>
    <p class="reel-bottom__lead">Sabastian Sawe · primeiro humano a fechar uma maratona oficial sub-2h. Adidas Adizero Adios Pro Evo 3.</p>
  </div>

  <div class="reel-logo">merge<span class="dot">.</span></div>
</div>

<script>
  // Counter sobe de 0:00:00 até 1:59:29 ao longo de 4.0s.
  // Aguarda <body> ganhar a classe `.go` (sincroniza com o renderer).
  const counter = document.getElementById('counter');
  const start = 0;
  const end = 1 * 3600 + 59 * 60 + 29;
  const duration = 4000;
  const delay = 500;

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function format(secs) {
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = Math.floor(secs % 60);
    return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  function run() {
    const startTime = performance.now() + delay;
    function tick(now) {
      const elapsed = now - startTime;
      if (elapsed < 0) { requestAnimationFrame(tick); return; }
      const t = Math.min(elapsed / duration, 1);
      const value = start + (end - start) * easeOutCubic(t);
      counter.textContent = format(value);
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function waitForGo() {
    if (document.body && document.body.classList.contains('go')) { run(); return; }
    new MutationObserver((m, obs) => {
      if (document.body.classList.contains('go')) { obs.disconnect(); run(); }
    }).observe(document.body || document.documentElement, { attributes: true, attributeFilter: ['class'] });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', waitForGo);
  } else {
    waitForGo();
  }
</script>
</body>
</html>
